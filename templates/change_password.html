{% extends "base.html" %}

{% block title %}{{ _('security_title') }} — PC Games Collection{% endblock %}

{% block head %}
    <link rel="stylesheet" href="/static/css/login.css">
{% endblock %}

{% block content %}
    <header class="nav-header">
        <div class="header-left-group" style="display: flex; align-items: center; gap: 20px;">
            <div class="nav-brand">
                <div class="d20-wrapper">
                    <svg id="d20-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="6" width="20" height="12" rx="2"></rect>
                        <path d="M6 12h4"></path>
                        <path d="M8 10v4"></path>
                        <circle cx="15" cy="10" r="1"></circle>
                        <circle cx="15" cy="14" r="1"></circle>
                        <circle cx="18" cy="12" r="1"></circle>
                    </svg>
                </div>
                <span>PC Games Collection — <em>{{ _('nav_ready_to_play') }}</em></span>
            </div>

            <div class="lang-selector-header">
                <button onclick="setLanguage('fr')" class="{% if get_current_lang() == 'fr' %}active{% endif %}" title="Français">FR</button>
                <button onclick="setLanguage('en')" class="{% if get_current_lang() == 'en' %}active{% endif %}" title="English">EN</button>
            </div>
        </div>
    </header>

    <div class="change-card">
        <h1>{{ _('security_title') }}</h1>
        <h2>{{ _('define_final_pwd_subtitle') }}</h2>
        <form action="/api/user/update_password" method="post">
            <input type="password" name="new_password" required placeholder="{{ _('new_password_placeholder') }}" autofocus>
            <button type="submit" class="btn-capsule" style="width:100%; height:44px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline>
                </svg>
                <span>{{ _('save_and_continue_btn') }}</span>
            </button>
        </form>
    </div>
{% endblock %}
