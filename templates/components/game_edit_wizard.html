<dialog id="game-edit-modal">
    <div class="modal modal--wide">
        <div class="modal-header">
            <h3 class="modal-title">{{ _('game_edit_title') }}</h3>
            <button class="icon-action" onclick="closeGameEditModal()" title="{{ _('close_btn_title') }}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>

        <div class="manage-tab-group">
            <div class="manage-tab-container">
                <button class="manage-tab-btn active" data-tab="meta" onclick="switchGameTab('meta', this)">{{ _('metadata_tab') }}</button>
                <button class="manage-tab-btn" data-tab="cover" onclick="switchGameTab('cover', this)">{{ _('cover_tab') }}</button>
                <button class="manage-tab-btn" data-tab="desc" onclick="switchGameTab('desc', this)">{{ _('synopsis_tab') }}</button>
                <button class="manage-tab-btn" data-tab="links" onclick="switchGameTab('links', this)">{{ _('links_tab') }}</button>
                <button class="manage-tab-btn" data-tab="tags" onclick="switchGameTab('tags', this)">{{ _('tags_tab') }}</button>
            </div>
        </div>

        <div class="manage-body" style="padding: 20px; overflow-y: auto;">
            <!-- Onglet Métadonnées -->
            <div id="game-tab-meta" class="manage-tab-content active" style="gap: 12px;">
                <div class="manage-header-line">
                    <span class="section-title">{{ _('general_info_section') }}</span>
                    <div class="manage-ia-controls">
                        <div id="gm-feedback" class="manage-feedback"></div>
                        <button class="icon-action icon-action--primary" onclick="generateGameMeta()" title="{{ _('generate_meta_ia_title') }}">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                        </button>
                    </div>
                </div>
                <div id="gm-edition-selector" style="display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px;"></div>
                <div class="manage-grid-2">
                    <div>
                        <label for="gm-title-fr" class="data-card-label">{{ _('title_fr_label') }}</label>
                        <input type="text" id="gm-title-fr" value="{{ game.meta.title_fr | default('', true) }}">
                    </div>
                    <div>
                        <label for="gm-title-en" class="data-card-label">{{ _('title_en_label') }}</label>
                        <input type="text" id="gm-title-en" value="{{ game.meta.title_en | default('', true) }}">
                    </div>
                </div>
                <div class="manage-grid-2">
                    <div>
                        <label for="gm-developer" class="data-card-label">{{ _('developer_label') }}</label>
                        <input type="text" id="gm-developer" value="{{ game.meta.developer | default('', true) }}">
                    </div>
                    <div>
                        <label for="gm-publisher" class="data-card-label">{{ _('publisher_label') }}</label>
                        <input type="text" id="gm-publisher" value="{{ game.meta.publisher | default('', true) }}">
                    </div>
                </div>
                <div class="manage-grid-2">
                    <div>
                        <label for="gm-genre" class="data-card-label">{{ _('genre_label') }}</label>
                        <input type="text" id="gm-genre" value="{{ game.meta.genre | default('', true) }}">
                    </div>
                    <div>
                        <label for="gm-release-date" class="data-card-label">{{ _('release_date_label') }}</label>
                        <input type="text" id="gm-release-date" value="{{ game.meta.release_date | default('', true) }}">
                    </div>
                </div>
                <div class="manage-grid-2">
                    <div>
                        <label for="gm-platform" class="data-card-label">{{ _('platform_label') }}</label>
                        <input type="text" id="gm-platform" value="{{ game.meta.platform | default('', true) }}">
                    </div>
                    <div>
                        <label for="gm-universe" class="data-card-label">{{ _('universe_theme_label') }}</label>
                        <input type="text" id="gm-universe" value="{{ game.meta.universe | default('', true) }}">
                    </div>
                </div>
                <div class="manage-grid-2">
                    <div>
                        <label for="gm-studio" class="data-card-label">{{ _('studio_label') }}</label>
                        <input type="text" id="gm-studio" value="{{ game.meta.studio | default('', true) }}">
                    </div>
                    <div>
                        <label for="gm-rating" class="data-card-label">{{ _('rating_100_label') }}</label>
                        <input type="number" id="gm-rating" value="{{ game.meta.rating if game.meta.rating is not none and game.meta.rating != '' else '' }}" step="0.1">
                    </div>
                </div>
                <div>
                    <label for="gm-keywords" class="data-card-label">{{ _('keywords_label') }}</label>
                    <input type="text" id="gm-keywords" value="{{ game.meta.keywords | default('', true) }}">
                </div>
                <div>
                    <label for="gm-youtube-urls" class="data-card-label">{{ _('trailers_yt_label') }}</label>
                    <textarea id="gm-youtube-urls" style="height:80px; resize:vertical;">{{ game.meta.youtube_urls | default('', true) }}</textarea>
                </div>
                
                <div style="display:flex; justify-content:flex-end; align-items:center; margin-top:16px;">
                    <button type="button" class="btn-capsule" onclick="saveGameMeta(this)">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                        <span>{{ _('save_btn') }}</span>
                    </button>
                </div>
            </div>

            <!-- Onglet Illustration -->
            <div id="game-tab-cover" class="manage-tab-content">
                <div class="manage-header-line">
                    <span class="modal-section-label">{{ _('web_search_section') }}</span>
                    <span class="save-status" id="cover-save-status">✓ {{ _('image_updated_status') }}</span>
                </div>
                <div class="cover-search-bar">
                    <input type="text" id="search-input" value="{{ game.title }}" placeholder="{{ _('keywords_placeholder') }}" aria-label="Recherche web de couverture">
                    <button class="cover-search-btn" onclick="launchWebSearch()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                    </button>
                </div>
                <div id="web-results" class="cover-grid"></div>
            </div>

            <!-- Onglet Synopsis -->
            <div id="game-tab-desc" class="manage-tab-content">
                <label for="ai-prompt">{{ _('ai_prompt_label') }}</label>
                <input type="text" id="ai-prompt" value="{{ ai_prompt_desc }}" style="margin-bottom:14px;">

                <div class="synopsis-modal-model-row" style="justify-content: flex-end;">
                    <button type="button" class="btn-capsule" onclick="generateDescription(this)">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                        </svg>
                        <span>{{ _('generate_with_ai_btn') }}</span>
                    </button>
                </div>

                <label for="desc-textarea">{{ _('result_editable_label') }} <span style="font-weight:400; color:var(--text-muted);">{{ _('editable_hint') }}</span></label>
                <textarea id="desc-textarea" style="height:280px; resize:vertical;"></textarea>
                
                <div style="display:flex; justify-content:flex-end; align-items:center; margin-top:16px;">
                    <button type="button" class="btn-capsule" onclick="saveDescription(this)">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                        <span>{{ _('save_btn') }}</span>
                    </button>
                </div>
            </div>

            <!-- Onglet Liens -->
            <div id="game-tab-links" class="manage-tab-content">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 12px; padding-bottom: 6px;">
                    <span class="section-title" style="border:none; margin:0; padding:0;">{{ _('reference_links_section') }}</span>
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <div id="gl-feedback" class="manage-feedback" style="margin:0;"></div>
                        <button class="icon-action icon-action--primary" onclick="generateGameLinks(this)" title="{{ _('search_links_ia_title') }}">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                        </button>
                    </div>
                </div>
                <div id="links-editor-list" style="display:flex; flex-direction:column; gap:10px; margin-bottom:20px;">
                    <!-- Les inputs de liens seront injectés ici -->
                </div>
                <button type="button" class="btn-capsule" onclick="addLinkRow()" style="width:100%;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    <span>{{ _('add_link_btn') }}</span>
                </button>
                <div style="display:flex; justify-content:flex-end; align-items:center; margin-top:16px;">
                    <button type="button" class="btn-capsule" onclick="saveLinks(this)">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                        <span>{{ _('save_btn') }}</span>
                    </button>
                </div>
            </div>

            <!-- Onglet TAGS -->
            <div id="game-tab-tags" class="manage-tab-content">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 12px; padding-bottom: 6px;">
                    <span class="section-title" style="border:none; margin:0; padding:0;">Classification par TAGS</span>
                    <button class="btn-capsule" onclick="addTagRow()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        <span>Ajouter un Tag</span>
                    </button>
                </div>
                
                <div id="tags-container" style="display:flex; flex-direction:column; gap:16px; margin-bottom:20px;">
                    <!-- Les familles et tags seront injectés ici -->
                </div>

                <div style="display:flex; justify-content:flex-end; align-items:center; margin-top:16px;">
                    <button type="button" class="btn-capsule" onclick="saveTags(this)">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                        <span>{{ _('save_btn') }}</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</dialog>

<script>
    // JS Logic migrated to static/js/game_wizard.js
</script>
