<dialog id="generic-wizard-modal">
    <div class="modal modal--wide">
        <div class="modal-header">
            <h3 class="modal-title" id="gw-title">{{ _('wizard_default_title') }}</h3>
            <button class="icon-action" id="gw-close-btn" title="{{ _('close_btn_title') }}" onclick="this.closest('dialog').close()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>

        <!-- Navigation par onglets (Mode Modal) -->
        <div class="manage-tab-group" id="gw-tab-group" style="display: none;">
            <div class="manage-tab-container" id="gw-tab-container">
                <!-- Onglets injectés ici -->
            </div>
        </div>

        <!-- Barre de progression (Mode Wizard) -->
        <div class="wizard-progress" id="gw-progress-bar" style="display: none;">
            <div class="wizard-progress-track">
                <div class="wizard-progress-fill" id="gw-progress-fill" style="width: 0%;"></div>
            </div>
            <div class="wizard-steps-indicators" id="gw-steps-indicators">
                <!-- Indicateurs d'étapes injectés ici -->
            </div>
        </div>

        <div class="manage-body" id="gw-body" style="padding: 20px; overflow-y: auto;">
            <!-- Contenu des étapes injecté ici -->
        </div>

        <div class="modal-footer" id="gw-footer" style="padding: 15px 20px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center;">
            <div id="gw-footer-left">
                <button type="button" class="btn-capsule btn-capsule--secondary" id="gw-prev-btn" style="display: none;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    <span>{{ _('prev_btn') }}</span>
                </button>
            </div>
            <div id="gw-footer-right" style="display: flex; gap: 10px;">
                <button type="button" class="btn-capsule" id="gw-next-btn" style="display: none;">
                    <span>{{ _('next_btn') }}</span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
                <button type="button" class="btn-capsule btn-capsule--primary" id="gw-submit-btn" style="display: none;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                    <span>{{ _('finish_btn') }}</span>
                </button>
            </div>
        </div>
    </div>
</dialog>

<link rel="stylesheet" href="/static/css/generic_wizard.css?v={{ APP_VERSION }}">
