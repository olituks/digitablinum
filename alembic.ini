# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration files
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d_%%(minute).2d-%%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone =

# prepend the current working directory to sys.path
# so that the main app is importable
prepend_sys_path = .

# version location specification; This defaults
# to migrations/versions.  When using multiple version
# directories, initial revs will go to the first directory,
# and each subsequent rev will go to the same directory as its revision source
# version_locations = %(here)s/bar %(here)s/bat migrations/versions

# the logging configuration file
# sqlalchemy.url is set dynamically in env.py
# sqlalchemy.url = sqlite:///./data/pc_games.db

[logging]
default_handler = console

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
